services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-moments}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      FRAME_STRATEGY: ${FRAME_STRATEGY:-interval}
      FRAME_INTERVAL_SEC: ${FRAME_INTERVAL_SEC:-2}
      CLIP_MODEL: ${CLIP_MODEL:-clip-ViT-B-32}
      TOP_K: ${TOP_K:-6}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache    # cache CLIP weights across restarts
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  hf_cache:
